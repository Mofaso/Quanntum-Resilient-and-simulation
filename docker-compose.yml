services:
  postgres:
    image: postgres:16
    container_name: aqr_cads_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quantum_defense
    ports:
      - "5432:5432"
    volumes:
      - aqr_cads_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quantum_defense"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  aqr_cads_pgdata:

